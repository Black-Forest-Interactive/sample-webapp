<mat-card>
  <div class="flex flex-col gap-2 p-4">
    <div class="flex flex-row">
      {{ event().title }}
    </div>
    <mat-divider></mat-divider>
    <div class="flex flex-row gap-5">
      <div>Start: {{ event().start |date:'medium' }}</div>
      <div>Finish: {{ event().finish |date:'medium' }}</div>
    </div>
    <div class="flex flex-col">
      <div class="text-sm">{{ event().shortText }}</div>
      <div class="text-sm">{{ event().longText }}</div>
    </div>
  </div>
</mat-card>
